name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@pivot'
      - run: npm ci
      - run: npm run build
      - run: cd dist && npm publish
        env:
          # Requires a PAT with write:packages scope stored as repository secret NPM_TOKEN.
          # GITHUB_TOKEN cannot be used — org-level workflow write permissions are disabled.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
